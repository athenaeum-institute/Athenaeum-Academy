  <style>
    /* Same root variables as dashboard */
    :root {
      --primary: #005088;
      --accent: #00D2FF;
      --bg: #F4F7FB;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --muted: #64748B;
      --green: #10B981;
      --red: #ef4444;
    }
    
    body { background-color: var(--bg); color: var(--text); }
    
    /* Live Classes Layout */
    .section-title { font-family: 'Merriweather', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
    
    .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
    
    .class-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; position: relative; transition: transform 0.2s, box-shadow 0.2s; }
    .class-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.05); border-color: rgba(0, 210, 255, 0.3); }
    
    .subject-badge { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 0.75rem; font-weight: 800; padding: 0.3rem 0.6rem; border-radius: 20px; text-transform: uppercase; }
    
    .status-badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; font-weight: 800; padding: 0.3rem 0.6rem; border-radius: 6px; margin-bottom: 1rem; text-transform: uppercase; width: fit-content; }
    .status-live { background: rgba(239, 68, 68, 0.1); color: var(--red); animation: pulse 2s infinite; }
    .status-upcoming { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
    .status-ended { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    
    .class-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.5rem; line-height: 1.3; }
    .class-teacher { font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
    .class-time { font-size: 0.85rem; font-weight: 600; color: var(--text); background: var(--bg); padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    
    .countdown { font-family: monospace; font-size: 1rem; font-weight: 700; color: var(--accent); margin-top: auto; margin-bottom: 1rem; }
    
    .btn-join { width: 100%; padding: 0.75rem; font-size: 0.95rem; font-weight: 700; border-radius: 8px; text-align: center; text-decoration: none; display: inline-block; transition: 0.2s; margin-top: auto; }
    .btn-join.live { background: var(--green); color: white; border: none; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    .btn-join.live:hover { background: #059669; }
    .btn-join.disabled { background: var(--bg); color: var(--muted); cursor: not-allowed; border: 1px solid var(--border); }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; background: var(--card); border: 1px dashed var(--border); border-radius: 12px; }
    .empty-icon { font-size: 3rem; color: var(--muted); margin-bottom: 1rem; }
  </style>

<body>

    <div class="sidebar-nav">

      <a href="courses.html" class="nav-item"><span class="material-symbols-outlined">menu_book</span> My Courses</a>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="icon-btn mobile-toggle" id="mobile-toggle"><span class="material-symbols-outlined">menu</span></button>
        <h1>Live Classes</h1>
      </div>
      <div class="header-actions" style="display:flex; align-items:center; gap:1rem;">
        <a href="index.html" class="glass-btn">
          <span class="material-symbols-outlined">home</span> Home
        </a>
        <button class="icon-btn" title="Logout" onclick="logout()">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </header>

    <div class="dashboard-body" id="dashboard-body">
      <div style="margin-bottom: 2rem;">
        <p style="color:var(--muted); font-size:1.1rem;">Join your interactive live sessions with Athenaeum instructors.</p>
      </div>

      <div id="classes-container">
        <div style="padding: 2rem; text-align: center; color: var(--muted);">Loading your schedule...</div>
      </div>
    </div>
  </main>

  <script>
    let countdownInterval;
    let liveClassesData = [];

    async function init() {
      // 1. Get user profile
      const userRes = await window.supabaseClient.auth.getUser();
      if (!userRes.data.user) {
        window.location.href = 'auth.html';
        return;
      }
      const user = userRes.data.user;

      // Fetch profile
      const { data: profile } = await window.supabaseClient.from('profiles').select('*').eq('id', user.id).single();
      if (profile) {
        document.getElementById('sb-name').innerText = profile.full_name || 'Student';
        document.getElementById('sb-initials').innerText = (profile.full_name || 'S').substring(0,2).toUpperCase();
      }

      // 2. Fetch live classes for enrolled courses
      try {
        const { data: enrollments, error: enrollError } = await window.supabaseClient
          .from('enrollments')
          .select('course_id, payment_status')
          .eq('student_id', user.id);

        if (enrollError) throw enrollError;

        // Filter valid enrollments (paid or free trial active)
        const validCourseIds = enrollments.filter(e => e.payment_status === 'paid' || e.payment_status === 'free').map(e => e.course_id);

        if (validCourseIds.length === 0) {
          renderEmptyState();
          return;
        }

        // Fetch classes
        const { data: classes, error: classesError } = await window.supabaseClient
          .from('live_classes')
          .select('*')
          .in('course_id', validCourseIds)
          .order('start_time', { ascending: true });

        if (classesError) throw classesError;

        liveClassesData = classes || [];
        renderClasses();

        // Start countdown timer updates
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(updateCountdowns, 1000);

      } catch (err) {
        console.error('Error fetching classes:', err);
        document.getElementById('classes-container').innerHTML = `<div style="color:red">Error loading classes: ${err.message}</div>`;
      }
    }

    function renderEmptyState() {
      document.getElementById('classes-container').innerHTML = `
        <div class="empty-state">
          <span class="material-symbols-outlined empty-icon">event_busy</span>
          <h2 style="margin-bottom:1rem; font-family:'Merriweather';">No Enrolled Courses</h2>
          <p style="color:var(--muted); margin-bottom:1.5rem;">You have no live classes yet. Enroll in a course to access live sessions.</p>
          <a href="courses.html" class="btn btn-primary" style="font-size:1.1rem; padding:0.75rem 2rem;">Browse Courses</a>
        </div>
      `;
    }

    function getSubjectColor(subject) {
      const s = subject.toLowerCase();
      if (s.includes('math')) return { bg: '#FFD700', color: '#000' };
      if (s.includes('phys')) return { bg: '#005088', color: '#FFF' };
      if (s.includes('bio')) return { bg: '#10B981', color: '#FFF' };
      if (s.includes('chem')) return { bg: '#8B5CF6', color: '#FFF' };
      if (s.includes('eng')) return { bg: '#F97316', color: '#FFF' };
      return { bg: '#E2E8F0', color: '#1E293B' };
    }

    function formatDateTime(isoString, endIsoString) {
      const d = new Date(isoString);
      const e = new Date(endIsoString);
      const dateOpts = { weekday: 'long', day: 'numeric', month: 'long' };
      const timeOpts = { hour: 'numeric', minute: '2-digit' };
      return `${d.toLocaleDateString('en-US', dateOpts)} &middot; ${d.toLocaleTimeString('en-US', timeOpts)} &ndash; ${e.toLocaleTimeString('en-US', timeOpts)}`;
    }

    function computeStatus(startStr, endStr) {
      const now = new Date();
      const start = new Date(startStr);
      const end = new Date(endStr);
      
      if (now >= start && now <= end) return 'live';
      if (now > end) return 'ended';
      return 'upcoming';
    }

    function renderClasses() {
      const now = new Date();
      
      // Update dynamic status based on current time
      liveClassesData.forEach(c => {
        c.computedStatus = computeStatus(c.start_time, c.end_time);
      });

      const liveClasses = liveClassesData.filter(c => c.computedStatus === 'live');
      const upcomingClasses = liveClassesData.filter(c => c.computedStatus === 'upcoming');
      const pastClasses = liveClassesData.filter(c => c.computedStatus === 'ended');

      let html = '';

      if (liveClasses.length > 0) {
        html += `<h2 class="section-title">LIVE NOW</h2><div class="class-grid">`;
        liveClasses.forEach(c => html += createClassCard(c));
        html += `</div>`;
      }

      if (upcomingClasses.length > 0) {
        html += `<h2 class="section-title" style="margin-top:2rem;">UPCOMING</h2><div class="class-grid">`;
        upcomingClasses.forEach(c => html += createClassCard(c));
        html += `</div>`;
      }

      if (pastClasses.length > 0) {
        html += `<h2 class="section-title" style="margin-top:2rem; color:var(--muted);">PAST CLASSES</h2><div class="class-grid" style="opacity:0.8">`;
        pastClasses.forEach(c => html += createClassCard(c));
        html += `</div>`;
      }

      if (liveClasses.length === 0 && upcomingClasses.length === 0 && pastClasses.length === 0) {
        document.getElementById('classes-container').innerHTML = `
          <div class="empty-state">
            <span class="material-symbols-outlined empty-icon">calendar_month</span>
            <h2 style="margin-bottom:1rem; font-family:'Merriweather';">No Scheduled Classes</h2>
            <p style="color:var(--muted);">Your instructors haven't scheduled any live classes for your courses yet.</p>
          </div>
        `;
        return;
      }

      document.getElementById('classes-container').innerHTML = html;
    }

    function createClassCard(c) {
      const subjColors = getSubjectColor(c.subject);
      let statusHtml = '';
      let actionHtml = '';
      
      const joinUrl = `live-class.html?room=${encodeURIComponent(c.jitsi_room_name)}&title=${encodeURIComponent(c.title)}&teacher=${encodeURIComponent(c.teacher_name)}`;

      if (c.computedStatus === 'live') {
        statusHtml = `<div class="status-badge status-live"><span class="material-symbols-outlined" style="font-size:14px;">sensors</span> LIVE NOW</div>`;
        actionHtml = `<a href="${joinUrl}" class="btn-join live">Join Class &rarr;</a>`;
      } else if (c.computedStatus === 'upcoming') {
        statusHtml = `<div class="status-badge status-upcoming"><span class="material-symbols-outlined" style="font-size:14px;">event</span> UPCOMING</div>`;
        actionHtml = `
          <div class="countdown" data-start="${c.start_time}" id="cd-${c.id}">Loading timer...</div>
          <button class="btn-join disabled" disabled>Waiting to start...</button>
        `;
      } else {
        statusHtml = `<div class="status-badge status-ended"><span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> ENDED</div>`;
        actionHtml = `<button class="btn-join disabled" disabled>Class Ended</button>`;
      }

      return `
        <div class="class-card" id="card-${c.id}">
          <div class="subject-badge" style="background:${subjColors.bg}; color:${subjColors.color}">${c.subject}</div>
          ${statusHtml}
          <h3 class="class-title">${c.title}</h3>
          <div class="class-teacher"><span class="material-symbols-outlined" style="font-size:16px">school</span> ${c.teacher_name}</div>
          <div class="class-time"><span class="material-symbols-outlined" style="font-size:18px; color:var(--primary)">schedule</span> ${formatDateTime(c.start_time, c.end_time)}</div>
          <p style="font-size:0.85rem; color:var(--muted); margin-bottom:1rem; flex-grow:1;">${c.description || ''}</p>
          ${actionHtml}
        </div>
      `;
    }

    function updateCountdowns() {
      const now = new Date().getTime();
      let needsRerender = false;

      document.querySelectorAll('.countdown').forEach(el => {
        const startStr = el.getAttribute('data-start');
        const startTime = new Date(startStr).getTime();
        const distance = startTime - now;

        if (distance <= 0) {
          // Timer hit zero! Trigger rerender to move card to LIVE section
          needsRerender = true;
        } else {
          // Calculate time
          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((distance % (1000 * 60)) / 1000);

          el.innerHTML = `Starts in ${days > 0 ? days + 'd ' : ''}${hours}h ${minutes}m ${seconds}s`;
        }
      });

      if (needsRerender) {
        renderClasses();
      }
    }

    async function logout() {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    window.onload = init;
  </script>

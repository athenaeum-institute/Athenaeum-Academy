<body>

  <!-- ── Main Live Layout ────────────────────────────────── -->
  <div class="live-layout">

    <!-- Video Stage (Jitsi Meet Integration) -->
    <div class="video-stage"
      style="width: 100%; padding: 0; background: transparent; border: none; display: flex; justify-content: center; align-items: center;">
      <div id="meet-container"
        style="width: 100%; height: calc(100vh - 60px); border: none;">
      </div>
    </div>
  </div>

  <script>
    // Jitsi Meet Integration
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room');
      const title = urlParams.get('title');
      const teacher = urlParams.get('teacher');

      if (!room) {
        alert("Invalid class link. Please go back to dashboard and click Join Class again.");
        window.history.back();
        return;
      }

      // Fetch Real Data from Supabase
      try {
        const { data: classData, error } = await window.supabaseClient
          .from('live_classes')
          .select('title, teacher_name')
          .eq('jitsi_room_name', room)
          .single();

        if (classData) {
          document.getElementById('header-title').innerText = classData.title;
          document.getElementById('header-teacher').innerText = '• ' + classData.teacher_name;
        } else {
          document.getElementById('header-title').innerText = 'Live Class';
        }
      } catch (err) {
        console.error("Error fetching class data", err);
        document.getElementById('header-title').innerText = 'Live Class';
      }

      // Wait for supabase session
      const { data: { user } } = await window.supabaseClient.auth.getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const displayName = user.user_metadata?.full_name || user.email || 'Student';

      const domain = 'meet.jit.si';
      const options = {
        roomName: room,
        width: '100%',
        height: '100%',
        parentNode: document.querySelector('#meet-container'),
        userInfo: {
          displayName: displayName,
          email: user.email
        },
        configOverwrite: {
          startWithAudioMuted: true,
          startWithVideoMuted: true,
          prejoinPageEnabled: false,
          disableDeepLinking: true,
          defaultLanguage: 'en',
          enableWelcomePage: false
        },
        interfaceConfigOverwrite: {
          SHOW_JITSI_WATERMARK: false,
          SHOW_BRAND_WATERMARK: false,
          SHOW_POWERED_BY: false,
          DISPLAY_WELCOME_PAGE_CONTENT: false,
          SHOW_PROMOTIONAL_CLOSE_PAGE: false,
          HIDE_INVITE_MORE_HEADER: true,
          DISABLE_JOIN_LEAVE_NOTIFICATIONS: true,
          TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'closedcaptions', 'desktop', 'embedmeeting', 'fullscreen',
            'fodeviceselection', 'hangout', 'profile', 'chat', 'recording',
            'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
            'videoquality', 'filmstrip', 'shortcuts', 'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone', 'security'
          ]
        }
      };

      const api = new JitsiMeetExternalAPI(domain, options);

      api.addEventListener('readyToClose', () => {
        window.location.href = 'dashboard-student.html';
      });
    });
  </script>

  <!-- Athenaeum Assistant Widget (with Supabase for auth check) -->

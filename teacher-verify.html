<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Verification | Athenaeum</title>
  
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="auth.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="auth-state.js"></script>
  <style>
    .auth-form-wrapper {
      max-width: 450px;
    }
  </style>
</head>
<body>

  <!-- Particle Background Element -->
  <div id="particles-js" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;"></div>

  <main class="auth-container">
    
    <div class="auth-form-wrapper" id="verify-section">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <span class="material-symbols-outlined">account_balance</span>
          Athenaeum
        </a>
        <br><br>
        <h2 id="form-title">Teacher Verification</h2>
        <p id="form-subtitle">Enter the security code provided by your administrator to unlock your course.</p>
      </div>

      <form id="verify-form" class="auth-form">
        
        <div class="input-group">
          <label for="security-code">Security Code</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="text" id="security-code" name="security-code" placeholder="e.g. ATH-MATH-X9K2" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          <span class="btn-text">Verify & Proceed</span>
          <span class="btn-loader"></span>
        </button>
      </form>
      
      <div class="auth-footer" style="margin-top:20px; text-align:center;">
        <button onclick="handleLogout()" class="btn btn-outline" style="border:none; color:var(--clr-muted); background:transparent;">Cancel and Logout</button>
      </div>
    </div>

    <!-- Success Screen (Hidden by default) -->
    <div id="success-screen" class="auth-form-wrapper" style="display: none; text-align: center; padding: 3rem 2rem;">
      <div class="success-icon" style="background:var(--clr-primary-light); color:var(--clr-primary); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
        <span class="material-symbols-outlined" style="font-size: 2.5rem;">verified</span>
      </div>
      <h2 style="font-family: var(--font-heading); margin-bottom: 0.5rem; font-size: 1.8rem;">Access Granted!</h2>
      <p style="color: var(--clr-muted); margin-bottom: 2rem; line-height: 1.6;">Your teacher account has been verified. You are being redirected to your dashboard.</p>
      
      <a id="success-dashboard-btn" href="dashboard-teacher.html" class="btn btn-primary">
        Go to Dashboard (<span id="countdown">3</span>)
      </a>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Simple particles init matching auth.html if needed
    particlesJS("particles-js", {
      particles: { number: { value: 40 }, color: { value: "#005088" }, shape: { type: "circle" }, opacity: { value: 0.3 }, size: { value: 3 }, line_linked: { enable: true, distance: 150, color: "#005088", opacity: 0.2, width: 1 }, move: { enable: true, speed: 2 } }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Ensure user is logged in
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'auth.html';
        return;
      }

      // 2. Ensure they are pending_teacher (if they are already Teacher, redirect to dashboard)
      const profile = await getUserProfile(user.id);
      if (profile && profile.role === 'Teacher') {
        window.location.href = 'dashboard-teacher.html';
        return;
      }
      
      if (profile && profile.role !== 'pending_teacher') {
        alert("You do not have a pending teacher account.");
        window.location.href = 'dashboard-student.html';
        return;
      }

      // 3. Handle Verify Form Submit
      const form = document.getElementById('verify-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const code = document.getElementById('security-code').value.trim();
        if(!code) return;

        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.classList.add('btn-loading');

        try {
          const { data, error } = await window.supabaseClient.rpc('verify_teacher_code', {
            entered_code: code
          });

          if (error) {
            console.error(error);
            alert("Error: " + error.message);
            throw error;
          }

          if (data === true) {
            // Success! Update local storage or session if needed
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';

            // Countdown
            let count = 3;
            const counterEl = document.getElementById('countdown');
            const interval = setInterval(() => {
              count--;
              if(counterEl) counterEl.innerText = count;
              if (count <= 0) {
                clearInterval(interval);
                window.location.href = 'dashboard-teacher.html';
              }
            }, 1000);
          } else {
            alert("Invalid security code.");
          }

        } catch (err) {
          // alert is handled above
        } finally {
          submitBtn.classList.remove('btn-loading');
        }
      });
    });
  </script>
</body>
</html>
